<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Ivy Roulette</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- LOGO ALWAYS VISIBLE -->

    <div class="logo-container">

        <img
            src="ivy-logo.png"
            class="logo"
            alt="Ivy Roulette">

    </div>

    <!-- HOME SCREEN -->

    <div
        class="home-screen"
        id="homeScreen">

        <h2>

            21+ • DRINK • DARE • GET WILD

        </h2>

        <input

            id="playersInput"

            type="text"

            placeholder="Enter your name"

        >

        <button id="startBtn">

            START GAME

        </button>

    </div>


    <!-- GAME SCREEN -->

    <div

        class="game-screen hidden"

        id="gameScreen">

        <h1 id="turnTitle">

            IT'S YOUR TURN

        </h1>

        <div class="wheel-container">

    <img
        src="wheel.png"
        id="wheel"
        alt="Ivy Roulette Wheel">

</div>

        <button id="spinBtn">

            SPIN THE WHEEL

        </button>

        <h2 id="categoryTitle"></h2>

        <button

            id="drawBtn"

            class="hidden">

            DRAW CARD

        </button>

        <div

            id="cardBox"

            class="hidden">

        </div>

        <button

            id="nextBtn"

            class="hidden">

            SPIN AGAIN

        </button>

    </div>

    <script src="cards.js"></script>

    <script src="game.js"></script>

</body>

</html>
