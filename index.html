<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ivy Roulette Reloaded</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===========================
     HOME SCREEN
=========================== -->

<div id="homeScreen" class="home-screen">

    <img
        src="ivy-logo.png"
        class="logo"
        alt="Ivy Roulette Logo"
    >

    <h2 class="tagline">

        21+ • DRINK • DARE • GET WILD

    </h2>

    <input

        id="playersInput"

        type="text"

        placeholder="Enter player names separated by commas"

    >

    <button id="startBtn">

        START GAME

    </button>

</div>

<!-- ===========================
     GAME SCREEN
=========================== -->

<div id="gameScreen" class="game-screen hidden">

    <!-- Keep logo visible the whole game -->

    <img

        src="ivy-logo.png"

        class="logo game-logo"

        alt="Ivy Roulette Logo"

    >

    <h1 id="turnTitle">

        PLAYER'S TURN

    </h1>

    <!-- Wheel -->

    <div class="wheel-container">

        <img

            src="wheel.png"

            id="wheel"

            alt="Ivy Roulette Wheel"

        >

    </div>

    <button id="spinBtn">

        SPIN THE WHEEL

    </button>

    <h2 id="categoryTitle"></h2>

    <button

        id="drawBtn"

        class="hidden">

        DRAW CARD

    </button>

    <!-- THIS WILL BECOME THE FLIPPING CARD -->

    <div

        id="cardBox"

        class="hidden">

    </div>

    <button

        id="nextBtn"

        class="hidden">

        NEXT PLAYER

    </button>

</div>

<script src="cards.js"></script>

<script src="game.js"></script>

</body>

</html>
